<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar & Hero | Cajeta La Reyna</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        retro: ['"Bricolage Grotesque"', 'serif'],
                        body: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        premium: {
                            black: 'rgba(10, 10, 10, 0.85)',
                            dark: '#141414',
                            border: 'rgba(255,255,255,0.08)',
                            hover: 'rgba(255,255,255,0.06)'
                        },
                        fall: {
                            cream: '#F4EFE6',
                            coffee: '#3E2723',
                            rust: '#C84B31',
                            mustard: '#E19832',
                            olive: '#4F6F52'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F4EFE6; overflow-x: hidden; }
        
        /* Ocultar elementos para GSAP */
        .dropdown-menu, #mobile-menu-panel { 
            display: none; 
            opacity: 0; 
        }
        .mobile-submenu {
            height: 0;
            overflow: hidden;
        }

        /* Micro-interacción de texto (Hover) */
        .nav-link-text {
            background: linear-gradient(to right, #ffffff, #ffffff);
            background-size: 0% 2px;
            background-repeat: no-repeat;
            background-position: left bottom;
            transition: background-size 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        button:hover .nav-link-text, a:hover .nav-link-text {
            background-size: 100% 2px;
        }
        
        /* Utilidad para la animación de texto del Hero */
        .hero-reveal { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); }
        .hero-word { display: inline-block; transform: translateY(100px); opacity: 0; }
    </style>
</head>
<body class="font-body min-h-screen">

    <!-- Fondo Sutil de Pruebas -->
    <div class="fixed inset-0 z-[-1] pointer-events-none opacity-40">
        <div class="absolute top-[-10%] left-[-10%] w-[40rem] h-[40rem] bg-fall-mustard/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-[35rem] h-[35rem] bg-fall-rust/5 rounded-full blur-[120px]"></div>
    </div>

    <!-- ==========================================
         [DESKTOP] NAVBAR FLOTANTE MINIMALISTA
    =========================================== -->
    <nav id="desktop-navbar" class="hidden md:flex fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-premium-black backdrop-blur-xl border border-premium-border rounded-full px-2.5 py-2.5 shadow-[0_25px_50px_rgba(0,0,0,0.15)] items-center gap-2 transition-all duration-500 opacity-0 translate-y-[-20px]">
        
        <!-- Dropdown: Pasos -->
        <div class="relative group dropdown-container">
            <button class="dropdown-toggle text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center gap-2.5">
                <span class="nav-link-text pb-0.5">Pasos</span>
                <svg class="w-4 h-4 chevron text-white/50 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div class="dropdown-menu absolute top-[125%] left-1/2 -translate-x-1/2 w-52 bg-premium-dark border border-premium-border rounded-3xl shadow-2xl overflow-hidden backdrop-blur-2xl">
                <div class="p-2.5 flex flex-col gap-1">
                    <a href="#paso1" class="text-white/75 hover:text-white hover:bg-premium-hover px-5 py-3.5 rounded-2xl text-[15px] font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span> Paso 1
                    </a>
                    <a href="#paso2" class="text-white/75 hover:text-white hover:bg-premium-hover px-5 py-3.5 rounded-2xl text-[15px] font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span> Paso 2
                    </a>
                    <a href="#paso3" class="text-white/75 hover:text-white hover:bg-premium-hover px-5 py-3.5 rounded-2xl text-[15px] font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span> Paso 3
                    </a>
                </div>
            </div>
        </div>

        <div class="w-[1.5px] h-5 bg-white/10 mx-1"></div>

        <!-- Dropdown: Etiquetas -->
        <div class="relative group dropdown-container">
            <button class="dropdown-toggle text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center gap-2.5">
                <span class="nav-link-text pb-0.5">Etiquetas</span>
                <svg class="w-4 h-4 chevron text-white/50 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <div class="dropdown-menu absolute top-[125%] left-1/2 -translate-x-1/2 w-48 bg-premium-dark border border-premium-border rounded-3xl shadow-2xl overflow-hidden backdrop-blur-2xl">
                <div class="p-2.5 flex flex-col gap-1">
                    <a href="#360" class="text-white/75 hover:text-white hover:bg-premium-hover px-5 py-3.5 rounded-2xl text-[15px] font-medium transition-all flex items-center justify-between">
                        360 gr <span class="text-[11px] font-bold text-white/30 border border-white/10 rounded-md px-2 py-1">Ver</span>
                    </a>
                    <a href="#155" class="text-white/75 hover:text-white hover:bg-premium-hover px-5 py-3.5 rounded-2xl text-[15px] font-medium transition-all flex items-center justify-between">
                        155 gr <span class="text-[11px] font-bold text-white/30 border border-white/10 rounded-md px-2 py-1">Ver</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="w-[1.5px] h-5 bg-white/10 mx-1"></div>

        <!-- Link: Acerca de -->
        <a href="#acerca-de" class="text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center">
            <span class="nav-link-text pb-0.5">Acerca de</span>
        </a>

    </nav>

    <!-- ==========================================
         [MOBILE] BOTÓN CIRCULAR (+6px Extra)
    =========================================== -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-6 right-6 z-50 w-[54px] h-[54px] bg-premium-black backdrop-blur-xl border border-premium-border rounded-full shadow-[0_15px_35px_rgba(0,0,0,0.2)] flex items-center justify-center group active:scale-90 transition-all duration-300">
        <div class="relative w-5 h-4 flex flex-col justify-between">
            <span class="w-full h-[2.5px] bg-white rounded-full transition-transform duration-300 transform origin-center line-1"></span>
            <span class="w-full h-[2.5px] bg-white rounded-full transition-opacity duration-300 line-2"></span>
            <span class="w-full h-[2.5px] bg-white rounded-full transition-transform duration-300 transform origin-center line-3"></span>
        </div>
    </button>

    <!-- [MOBILE] PANEL DE CRISTAL (Acordeones) -->
    <div id="mobile-menu-panel" class="md:hidden fixed inset-x-4 top-[100px] z-40 bg-premium-dark/95 backdrop-blur-2xl border border-premium-border rounded-[2rem] shadow-2xl p-6">
        <div class="flex flex-col gap-2.5">
            
            <!-- Acordeón Pasos -->
            <div class="mobile-accordion bg-white/5 rounded-2xl overflow-hidden border border-white/5">
                <button class="w-full flex justify-between items-center text-white px-6 py-4.5 font-medium text-lg accordion-trigger active:bg-white/5 transition-colors">
                    Pasos
                    <svg class="w-5 h-5 text-white/50 chevron-mob transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="mobile-submenu bg-black/20">
                    <div class="flex flex-col px-6 py-3 pb-5 gap-2">
                        <a href="#paso1" class="text-white/60 hover:text-white py-2 text-base flex items-center gap-3"><span class="w-1.5 h-1.5 bg-fall-rust rounded-full"></span> Paso 1</a>
                        <a href="#paso2" class="text-white/60 hover:text-white py-2 text-base flex items-center gap-3"><span class="w-1.5 h-1.5 bg-fall-rust rounded-full"></span> Paso 2</a>
                        <a href="#paso3" class="text-white/60 hover:text-white py-2 text-base flex items-center gap-3"><span class="w-1.5 h-1.5 bg-fall-rust rounded-full"></span> Paso 3</a>
                    </div>
                </div>
            </div>

            <!-- Acordeón Etiquetas -->
            <div class="mobile-accordion bg-white/5 rounded-2xl overflow-hidden border border-white/5">
                <button class="w-full flex justify-between items-center text-white px-6 py-4.5 font-medium text-lg accordion-trigger active:bg-white/5 transition-colors">
                    Etiquetas
                    <svg class="w-5 h-5 text-white/50 chevron-mob transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="mobile-submenu bg-black/20">
                    <div class="flex flex-col px-6 py-3 pb-5 gap-2">
                        <a href="#360" class="text-white/60 hover:text-white py-2 text-base flex items-center justify-between">
                            360 gr <span class="text-[11px] font-bold uppercase border border-white/10 px-2.5 py-1 rounded-md text-white/40">Ver</span>
                        </a>
                        <a href="#155" class="text-white/60 hover:text-white py-2 text-base flex items-center justify-between">
                            155 gr <span class="text-[11px] font-bold uppercase border border-white/10 px-2.5 py-1 rounded-md text-white/40">Ver</span>
                        </a>
                    </div>
                </div>
            </div>

            <a href="#acerca-de" class="w-full flex items-center text-white px-6 py-4.5 text-lg font-medium rounded-2xl active:bg-white/5 transition-colors mt-2">
                Acerca de
            </a>
        </div>
    </div>

    <!-- ==========================================
         HERO SECTION (Título y Subtítulo)
    =========================================== -->
    <header class="relative w-full h-screen flex flex-col justify-center items-center text-center px-4 md:px-6">
        <div class="max-w-5xl mx-auto w-full flex flex-col items-center">
            
            <!-- Etiqueta Opcional de Alta Gama -->
            <div class="hero-badge opacity-0 translate-y-4 inline-flex items-center gap-2 py-1.5 px-4 rounded-full bg-fall-rust/10 border border-fall-rust/20 text-fall-rust mb-6 md:mb-8">
                <span class="w-2 h-2 rounded-full bg-fall-rust animate-pulse"></span>
            </div>

            <!-- TÍTULO (Cajeta La Reyna) -->
            <div class="hero-reveal overflow-hidden px-2 py-2">
                <h1 class="font-retro text-5xl sm:text-7xl md:text-8xl lg:text-[7.5rem] font-extrabold text-fall-coffee leading-[1.05] tracking-tight flex flex-wrap justify-center gap-x-3 md:gap-x-5 gap-y-2">
                    <span class="hero-word">Cajeta</span> 
                    <span class="hero-word text-fall-rust">La</span> 
                    <span class="hero-word text-fall-rust">Reyna</span>
                </h1>
            </div>

            <!-- SUBTÍTULO -->
            <div class="hero-reveal overflow-hidden mt-6 px-4">
                <p class="font-body text-xl sm:text-2xl md:text-3xl text-fall-coffee/75 font-medium tracking-tight flex flex-wrap justify-center gap-x-2 md:gap-x-2.5">
                    <span class="hero-word">Guía</span>
                    <span class="hero-word">para</span>
                    <span class="hero-word">enviar</span>
                    <span class="hero-word">el</span>
                    <span class="hero-word">producto</span>
                    <span class="hero-word">a</span>
                    <span class="hero-word font-bold text-fall-coffee">Amazon.</span>
                </p>
            </div>

        </div>
    </header>

    <!-- Scripts de Interacción GSAP -->
    <script>
        // ----------------------------------------------------
        // Animación de Carga (Hero & Navbar)
        // ----------------------------------------------------
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline();
            
            // Aparecer barra Desktop
            tl.to("#desktop-navbar", { opacity: 1, y: 0, duration: 1, ease: "power3.out", delay: 0.2 });
            
            // Animación del Hero
            tl.to(".hero-badge", { opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.5)" }, "-=0.6");
            
            // Revelar palabras una por una
            tl.to(".hero-word", {
                y: 0,
                opacity: 1,
                duration: 1.2,
                stagger: 0.05,
                ease: "power4.out"
            }, "-=0.4");
        });

        // ----------------------------------------------------
        // Lógica DESKTOP: Click & Outside Click
        // ----------------------------------------------------
        const dropdownContainers = document.querySelectorAll('.dropdown-container');
        let activeDropdown = null;

        dropdownContainers.forEach(container => {
            const toggle = container.querySelector('.dropdown-toggle');
            const menu = container.querySelector('.dropdown-menu');
            const chevron = container.querySelector('.chevron');

            gsap.set(menu, { display: "none", opacity: 0, y: -15, scale: 0.95 });

            toggle.addEventListener('click', (e) => {
                e.stopPropagation(); 
                if (activeDropdown && activeDropdown !== menu) closeDropdown(activeDropdown);
                menu.classList.contains('is-open') ? closeDropdown(menu, chevron) : openDropdown(menu, chevron);
            });
        });

        document.addEventListener('click', () => activeDropdown && closeDropdown(activeDropdown));

        function openDropdown(menu, chevron) {
            menu.classList.add('is-open');
            activeDropdown = menu;
            gsap.to(chevron || menu.parentElement.querySelector('.chevron'), { rotation: 180, duration: 0.4, ease: "back.out(1.7)" });
            gsap.to(menu, { display: "block", opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "power3.out" });
        }

        function closeDropdown(menu, chevron) {
            menu.classList.remove('is-open');
            activeDropdown = null;
            gsap.to(chevron || menu.parentElement.querySelector('.chevron'), { rotation: 0, duration: 0.3, ease: "power3.out" });
            gsap.to(menu, { opacity: 0, y: -15, scale: 0.95, duration: 0.25, ease: "power2.in", onComplete: () => gsap.set(menu, { display: "none" }) });
        }

        // ----------------------------------------------------
        // Lógica MOBILE: Menú Circular y Acordeones
        // ----------------------------------------------------
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobilePanel = document.getElementById('mobile-menu-panel');
        const line1 = document.querySelector('.line-1'), line2 = document.querySelector('.line-2'), line3 = document.querySelector('.line-3');
        let isMobileMenuOpen = false;

        gsap.set(mobilePanel, { display: "none", opacity: 0, y: -20, scale: 0.98 });

        mobileBtn.addEventListener('click', () => {
            isMobileMenuOpen = !isMobileMenuOpen;
            if (isMobileMenuOpen) {
                line1.style.transform = 'translateY(7.5px) rotate(45deg)';
                line2.style.opacity = '0';
                line3.style.transform = 'translateY(-7.5px) rotate(-45deg)';
                gsap.to(mobilePanel, { display: "block", opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.2)" });
            } else {
                line1.style.transform = 'translateY(0) rotate(0)';
                line2.style.opacity = '1';
                line3.style.transform = 'translateY(0) rotate(0)';
                gsap.to(mobilePanel, { opacity: 0, y: -20, scale: 0.98, duration: 0.3, ease: "power2.in", onComplete: () => gsap.set(mobilePanel, { display: "none" }) });
            }
        });

        const accordions = document.querySelectorAll('.mobile-accordion');
        accordions.forEach(acc => {
            const trigger = acc.querySelector('.accordion-trigger'), submenu = acc.querySelector('.mobile-submenu'), chevron = acc.querySelector('.chevron-mob');
            let isOpen = false;
            trigger.addEventListener('click', () => {
                isOpen = !isOpen;
                if (isOpen) {
                    gsap.to(chevron, { rotation: 180, duration: 0.4, ease: "back.out(2)" });
                    gsap.to(submenu, { height: "auto", duration: 0.4, ease: "power2.out" });
                } else {
                    gsap.to(chevron, { rotation: 0, duration: 0.3, ease: "power2.out" });
                    gsap.to(submenu, { height: 0, duration: 0.3, ease: "power2.inOut" });
                }
            });
        });
    </script>
</body>
</html>
