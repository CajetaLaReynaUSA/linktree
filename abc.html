<!DOCTYPE html>
<html lang="es" class="antialiased scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Navbar | Cinematic Scroll</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Google Fonts Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        retro: ['"Bricolage Grotesque"', 'serif'],
                        body: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        premium: {
                            black: 'rgba(10, 10, 10, 0.85)',
                            dark: '#141414',
                            border: 'rgba(255,255,255,0.08)',
                            hover: 'rgba(255,255,255,0.06)'
                        },
                        fall: {
                            cream: '#F4EFE6',
                            rust: '#C84B31',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F4EFE6; overflow-x: hidden; }
        
        .nav-link-text {
            background: linear-gradient(to right, #ffffff, #ffffff);
            background-size: 0% 2px;
            background-repeat: no-repeat;
            background-position: left bottom;
            transition: background-size 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        button:hover .nav-link-text, a:hover .nav-link-text { background-size: 100% 2px; }
        
        /* Ocultar elementos para entrada GSAP */
        #desktop-navbar, #mobile-menu-btn { opacity: 0; }
    </style>
</head>
<body class="font-body min-h-screen">

    <!-- ==========================================
         [DESKTOP] NAVBAR SMART FLOTANTE
    =========================================== -->
    <!-- Nota: Se quitó el translateY nativo de Tailwind, ahora GSAP controla toda su posición Y -->
    <nav id="desktop-navbar" class="hidden md:flex fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-premium-black backdrop-blur-xl border border-premium-border rounded-full px-2.5 py-2.5 shadow-[0_25px_50px_rgba(0,0,0,0.15)] items-center gap-2">
        
        <div class="relative group">
            <button class="text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center gap-2.5">
                <span class="nav-link-text pb-0.5">Pasos</span>
            </button>
        </div>

        <div class="w-[1.5px] h-5 bg-white/10 mx-1"></div>

        <div class="relative group">
            <button class="text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center gap-2.5">
                <span class="nav-link-text pb-0.5">Etiquetas</span>
            </button>
        </div>

        <div class="w-[1.5px] h-5 bg-white/10 mx-1"></div>

        <a href="#acerca-de" class="text-white/85 hover:text-white px-6 py-3 rounded-full text-[15px] font-medium transition-colors flex items-center">
            <span class="nav-link-text pb-0.5">Acerca de</span>
        </a>

    </nav>

    <!-- ==========================================
         [MOBILE] BOTÓN CIRCULAR SMART
    =========================================== -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-6 right-6 z-50 w-[54px] h-[54px] bg-premium-black backdrop-blur-xl border border-premium-border rounded-full shadow-[0_15px_35px_rgba(0,0,0,0.2)] flex items-center justify-center group active:scale-90 transition-transform duration-300">
        <div class="relative w-5 h-4 flex flex-col justify-between">
            <span class="w-full h-[2.5px] bg-white rounded-full"></span>
            <span class="w-full h-[2.5px] bg-white rounded-full"></span>
            <span class="w-full h-[2.5px] bg-white rounded-full"></span>
        </div>
    </button>


    <!-- Área de pruebas para poder hacer Scroll -->
    <header class="w-full h-screen flex flex-col justify-center items-center text-center">
        <h1 class="font-retro text-5xl md:text-7xl font-extrabold text-[#3E2723]">Haz Scroll hacia abajo 👇</h1>
        <p class="mt-4 text-xl text-[#3E2723]/60 font-body">Verás cómo la navegación desaparece suavemente.</p>
    </header>
    
    <section class="w-full h-[200vh] bg-[#3E2723] flex flex-col pt-32 items-center text-center">
        <h2 class="font-retro text-4xl md:text-6xl text-white mb-6">Ahora haz un scroll intencional hacia arriba 👆</h2>
        <p class="text-lg text-white/60 font-body max-w-md">Si solo haces un micro-movimiento por accidente, la barra no saldrá. Solo aparecerá si realmente deseas subir.</p>
    </section>

    <!-- LÓGICA SMART NAVBAR -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Animación de Entrada Inicial
            gsap.fromTo(["#desktop-navbar", "#mobile-menu-btn"], 
                { y: -100, opacity: 0 }, 
                { y: 0, opacity: 1, duration: 1.2, ease: "power4.out", delay: 0.2 }
            );

            // 2. Lógica del "Smart Header" (Ocultar/Mostrar al scrollear)
            let lastScrollY = window.scrollY;
            let isNavHidden = false;
            let isTicking = false;
            
            // EL SECRETO UX: Umbral de tolerancia de 15px.
            // Ignora los movimientos microscópicos del dedo o reajustes de lectura.
            const scrollThreshold = 15; 

            const navElements = ["#desktop-navbar", "#mobile-menu-btn"];

            function updateNavbar() {
                const currentScrollY = window.scrollY;
                
                // Calculamos cuánto se movió realmente el usuario
                const scrolledDistance = Math.abs(currentScrollY - lastScrollY);

                // Si no superó nuestro umbral mínimo, no hacemos nada (ignora toques accidentales)
                if (scrolledDistance < scrollThreshold) {
                    isTicking = false;
                    return;
                }

                // Lógica de Desaparecer (Scroll Hacia Abajo)
                if (currentScrollY > lastScrollY && currentScrollY > 100) {
                    if (!isNavHidden) {
                        gsap.to(navElements, { 
                            y: -120, // Se esconde hacia arriba
                            opacity: 0, 
                            duration: 0.5, 
                            ease: "power3.inOut" 
                        });
                        isNavHidden = true;
                    }
                } 
                // Lógica de Re-aparecer (Scroll Hacia Arriba)
                else if (currentScrollY < lastScrollY) {
                    if (isNavHidden) {
                        gsap.to(navElements, { 
                            y: 0, // Vuelve a su posición original
                            opacity: 1, 
                            duration: 0.5, 
                            ease: "power3.out" 
                        });
                        isNavHidden = false;
                    }
                }

                // Guardar la nueva posición
                lastScrollY = currentScrollY;
                isTicking = false;
            }

            // Escuchador de Scroll ultra-optimizado usando requestAnimationFrame
            window.addEventListener('scroll', () => {
                if (!isTicking) {
                    window.requestAnimationFrame(updateNavbar);
                    isTicking = true;
                }
            });
        });
    </script>
</body>
</html>
