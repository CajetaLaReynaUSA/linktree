<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Ultra-Premium | Minimalist Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        body: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        premium: {
                            black: 'rgba(10, 10, 10, 0.85)', /* Translucidez para el Blur */
                            dark: '#141414',
                            border: 'rgba(255,255,255,0.08)',
                            hover: 'rgba(255,255,255,0.05)'
                        },
                        fall: {
                            rust: '#C84B31',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F4EFE6; }
        
        /* Estados iniciales ocultos para GSAP */
        .dropdown-menu, #mobile-menu-panel { 
            display: none; 
            opacity: 0; 
        }
        
        .mobile-submenu {
            height: 0;
            overflow: hidden;
        }

        /* Micro-interacción de texto brillante */
        .nav-link-text {
            background: linear-gradient(to right, #ffffff, #ffffff);
            background-size: 0% 2px;
            background-repeat: no-repeat;
            background-position: left bottom;
            transition: background-size 0.3s ease;
        }
        button:hover .nav-link-text, a:hover .nav-link-text {
            background-size: 100% 2px;
        }
    </style>
</head>
<body class="font-body min-h-screen pt-32">

    <!-- ==========================================
         [DESKTOP] CÁPSULA FLOTANTE MINIMALISTA
    =========================================== -->
    <nav id="desktop-navbar" class="hidden md:flex fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-premium-black backdrop-blur-xl border border-premium-border rounded-full px-2 py-2 shadow-[0_20px_40px_rgba(0,0,0,0.15)] items-center gap-1 transition-all duration-500">
        
        <!-- Opción 1: Pasos (Dropdown) -->
        <div class="relative group dropdown-container">
            <button class="dropdown-toggle text-white/80 hover:text-white px-5 py-2.5 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
                <span class="nav-link-text pb-0.5">Pasos</span>
                <svg class="w-4 h-4 chevron text-white/50 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <!-- Menú Desplegable -->
            <div class="dropdown-menu absolute top-[120%] left-1/2 -translate-x-1/2 w-48 bg-premium-dark border border-premium-border rounded-2xl shadow-2xl overflow-hidden backdrop-blur-2xl">
                <div class="p-2 flex flex-col gap-1">
                    <a href="#paso1" class="text-white/70 hover:text-white hover:bg-premium-hover px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity"></span> Paso 1
                    </a>
                    <a href="#paso2" class="text-white/70 hover:text-white hover:bg-premium-hover px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity"></span> Paso 2
                    </a>
                    <a href="#paso3" class="text-white/70 hover:text-white hover:bg-premium-hover px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center gap-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-fall-rust opacity-0 group-hover:opacity-100 transition-opacity"></span> Paso 3
                    </a>
                </div>
            </div>
        </div>

        <!-- Divisor Visual -->
        <div class="w-px h-4 bg-white/10 mx-1"></div>

        <!-- Opción 2: Etiquetas (Dropdown) -->
        <div class="relative group dropdown-container">
            <button class="dropdown-toggle text-white/80 hover:text-white px-5 py-2.5 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
                <span class="nav-link-text pb-0.5">Etiquetas</span>
                <svg class="w-4 h-4 chevron text-white/50 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            <!-- Menú Desplegable -->
            <div class="dropdown-menu absolute top-[120%] left-1/2 -translate-x-1/2 w-40 bg-premium-dark border border-premium-border rounded-2xl shadow-2xl overflow-hidden backdrop-blur-2xl">
                <div class="p-2 flex flex-col gap-1">
                    <a href="#360gr" class="text-white/70 hover:text-white hover:bg-premium-hover px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center justify-between">
                        360 gr <span class="text-xs text-white/30 border border-white/10 rounded px-1.5 py-0.5">Ver</span>
                    </a>
                    <a href="#155gr" class="text-white/70 hover:text-white hover:bg-premium-hover px-4 py-3 rounded-xl text-sm font-medium transition-all flex items-center justify-between">
                        155 gr <span class="text-xs text-white/30 border border-white/10 rounded px-1.5 py-0.5">Ver</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Divisor Visual -->
        <div class="w-px h-4 bg-white/10 mx-1"></div>

        <!-- Opción 3: Acerca de (Link Directo) -->
        <a href="#acerca-de" class="text-white/80 hover:text-white px-5 py-2.5 rounded-full text-sm font-medium transition-colors flex items-center">
            <span class="nav-link-text pb-0.5">Acerca de</span>
        </a>

    </nav>

    <!-- ==========================================
         [MOBILE] BOTÓN CIRCULAR FLOTANTE
    =========================================== -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-6 right-6 z-50 w-12 h-12 bg-premium-black backdrop-blur-xl border border-premium-border rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.2)] flex items-center justify-center group active:scale-90 transition-all duration-300">
        <div class="relative w-5 h-4 flex flex-col justify-between">
            <span class="w-full h-[2px] bg-white rounded-full transition-transform duration-300 transform origin-center line-1"></span>
            <span class="w-full h-[2px] bg-white rounded-full transition-opacity duration-300 line-2"></span>
            <span class="w-full h-[2px] bg-white rounded-full transition-transform duration-300 transform origin-center line-3"></span>
        </div>
    </button>

    <!-- ==========================================
         [MOBILE] PANEL DE CRISTAL (Acordeones)
    =========================================== -->
    <div id="mobile-menu-panel" class="md:hidden fixed inset-x-4 top-24 z-40 bg-premium-dark/95 backdrop-blur-2xl border border-premium-border rounded-3xl shadow-2xl p-6">
        <div class="flex flex-col gap-2">
            
            <!-- Acordeón 1: Pasos -->
            <div class="mobile-accordion bg-white/5 rounded-2xl overflow-hidden border border-white/5">
                <button class="w-full flex justify-between items-center text-white px-5 py-4 font-medium accordion-trigger active:bg-white/5 transition-colors">
                    Pasos
                    <svg class="w-5 h-5 text-white/50 chevron-mob transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="mobile-submenu bg-black/20">
                    <div class="flex flex-col px-5 py-2 pb-4 gap-1">
                        <a href="#paso1" class="text-white/60 hover:text-white py-2 flex items-center gap-3"><span class="w-1 h-1 bg-fall-rust rounded-full"></span> Paso 1</a>
                        <a href="#paso2" class="text-white/60 hover:text-white py-2 flex items-center gap-3"><span class="w-1 h-1 bg-fall-rust rounded-full"></span> Paso 2</a>
                        <a href="#paso3" class="text-white/60 hover:text-white py-2 flex items-center gap-3"><span class="w-1 h-1 bg-fall-rust rounded-full"></span> Paso 3</a>
                    </div>
                </div>
            </div>

            <!-- Acordeón 2: Etiquetas -->
            <div class="mobile-accordion bg-white/5 rounded-2xl overflow-hidden border border-white/5">
                <button class="w-full flex justify-between items-center text-white px-5 py-4 font-medium accordion-trigger active:bg-white/5 transition-colors">
                    Etiquetas
                    <svg class="w-5 h-5 text-white/50 chevron-mob transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div class="mobile-submenu bg-black/20">
                    <div class="flex flex-col px-5 py-2 pb-4 gap-1">
                        <a href="#360gr" class="text-white/60 hover:text-white py-2 flex items-center justify-between">
                            360 gr <span class="text-[10px] uppercase border border-white/10 px-2 py-0.5 rounded text-white/40">Ver</span>
                        </a>
                        <a href="#155gr" class="text-white/60 hover:text-white py-2 flex items-center justify-between">
                            155 gr <span class="text-[10px] uppercase border border-white/10 px-2 py-0.5 rounded text-white/40">Ver</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Link: Acerca de -->
            <a href="#acerca-de" class="w-full flex items-center text-white px-5 py-4 font-medium rounded-2xl active:bg-white/5 transition-colors mt-2">
                Acerca de
            </a>

        </div>
    </div>

    <!-- Scripts GSAP de Interacción Física -->
    <script>
        // ----------------------------------------------------
        // [DESKTOP] Lógica Click & Click-Outside
        // ----------------------------------------------------
        const dropdownContainers = document.querySelectorAll('.dropdown-container');
        let activeDropdown = null;

        dropdownContainers.forEach(container => {
            const toggle = container.querySelector('.dropdown-toggle');
            const menu = container.querySelector('.dropdown-menu');
            const chevron = container.querySelector('.chevron');

            // Setup invisible inicial
            gsap.set(menu, { display: "none", opacity: 0, y: -15, scale: 0.95 });

            toggle.addEventListener('click', (e) => {
                e.stopPropagation(); 

                // Cerrar el activo si es diferente al que clickeamos
                if (activeDropdown && activeDropdown !== menu) {
                    closeDropdown(activeDropdown);
                }

                // Alternar el actual
                if (menu.classList.contains('is-open')) {
                    closeDropdown(menu, chevron);
                } else {
                    openDropdown(menu, chevron);
                }
            });
        });

        // Click en el vacío cierra el dropdown activo
        document.addEventListener('click', () => {
            if (activeDropdown) {
                closeDropdown(activeDropdown);
            }
        });

        function openDropdown(menu, chevron) {
            menu.classList.add('is-open');
            activeDropdown = menu;
            
            gsap.to(chevron || menu.parentElement.querySelector('.chevron'), { rotation: 180, duration: 0.4, ease: "back.out(1.7)" });
            
            // Animación de aparición magnética
            gsap.to(menu, {
                display: "block",
                opacity: 1,
                y: 0,
                scale: 1,
                duration: 0.4,
                ease: "power3.out"
            });
        }

        function closeDropdown(menu, chevron) {
            menu.classList.remove('is-open');
            activeDropdown = null;
            
            gsap.to(chevron || menu.parentElement.querySelector('.chevron'), { rotation: 0, duration: 0.3, ease: "power3.out" });
            
            // Animación de cierre
            gsap.to(menu, {
                opacity: 0,
                y: -15,
                scale: 0.95,
                duration: 0.25,
                ease: "power2.in",
                onComplete: () => gsap.set(menu, { display: "none" })
            });
        }

        // ----------------------------------------------------
        // [MOBILE] Menú Circular & Acordeones
        // ----------------------------------------------------
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const mobilePanel = document.getElementById('mobile-menu-panel');
        
        // Elementos del icono hamburguesa
        const line1 = document.querySelector('.line-1');
        const line2 = document.querySelector('.line-2');
        const line3 = document.querySelector('.line-3');

        let isMobileMenuOpen = false;

        gsap.set(mobilePanel, { display: "none", opacity: 0, y: -20, scale: 0.98 });

        mobileBtn.addEventListener('click', () => {
            isMobileMenuOpen = !isMobileMenuOpen;
            
            if (isMobileMenuOpen) {
                // Animar Icono a "X"
                line1.style.transform = 'translateY(7px) rotate(45deg)';
                line2.style.opacity = '0';
                line3.style.transform = 'translateY(-7px) rotate(-45deg)';

                // Mostrar Panel con Efecto de Cristal
                gsap.to(mobilePanel, {
                    display: "block",
                    opacity: 1,
                    y: 0,
                    scale: 1,
                    duration: 0.5,
                    ease: "back.out(1.2)"
                });
            } else {
                // Restaurar Icono Hamburguesa
                line1.style.transform = 'translateY(0) rotate(0)';
                line2.style.opacity = '1';
                line3.style.transform = 'translateY(0) rotate(0)';

                // Ocultar Panel
                gsap.to(mobilePanel, {
                    opacity: 0,
                    y: -20,
                    scale: 0.98,
                    duration: 0.3,
                    ease: "power2.in",
                    onComplete: () => gsap.set(mobilePanel, { display: "none" })
                });
            }
        });

        // Acordeones Internos Mobile
        const accordions = document.querySelectorAll('.mobile-accordion');
        
        accordions.forEach(acc => {
            const trigger = acc.querySelector('.accordion-trigger');
            const submenu = acc.querySelector('.mobile-submenu');
            const chevron = acc.querySelector('.chevron-mob');
            let isOpen = false;

            trigger.addEventListener('click', () => {
                isOpen = !isOpen;
                
                if (isOpen) {
                    gsap.to(chevron, { rotation: 180, duration: 0.4, ease: "back.out(2)" });
                    gsap.to(submenu, { 
                        height: "auto", 
                        duration: 0.4, 
                        ease: "power2.out" 
                    });
                } else {
                    gsap.to(chevron, { rotation: 0, duration: 0.3, ease: "power2.out" });
                    gsap.to(submenu, { 
                        height: 0, 
                        duration: 0.3, 
                        ease: "power2.inOut" 
                    });
                }
            });
        });
    </script>
</body>
</html>
