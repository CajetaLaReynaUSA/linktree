<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Mobile | Cajeta La Reyna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@800&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { retro: ['"Bricolage Grotesque"', 'serif'], body: ['Outfit', 'sans-serif'] },
                    colors: {
                        premium: { dark: '#141414', border: 'rgba(255,255,255,0.08)', hover: 'rgba(255,255,255,0.06)' },
                        fall: { cream: '#F4EFE6', coffee: '#3E2723', rust: '#C84B31', leather: '#8B5A33' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F4EFE6; }
        .accordion-content { height: 0; overflow: hidden; opacity: 0; }
        .is-open > .accordion-content { height: auto; opacity: 1; }
    </style>
</head>
<body class="font-body p-4">

    <!-- ==========================================
         COMPONENTE DE RECURSOS (MOBILE)
    =========================================== -->
    <div class="max-w-sm mx-auto mt-10">
        
        <!-- Contenedor Principal con efecto Glassmorphism -->
        <div class="bg-white/70 backdrop-blur-xl border border-white rounded-3xl shadow-[0_15px_35px_rgba(62,39,35,0.05)] overflow-hidden">
            
            <!-- CABECERA DEL ACORDEÓN PRINCIPAL (Nivel 1) -->
            <button id="main-trigger" class="w-full flex items-center justify-between p-6 group">
                <div class="flex items-center gap-4">
                    <!-- Icono circular premium -->
                    <span class="flex items-center justify-center w-12 h-12 rounded-full bg-fall-leather/10 text-fall-leather border border-fall-leather/10 transition-colors group-hover:bg-fall-leather group-hover:text-white">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </span>
                    <h3 class="font-retro text-2xl font-extrabold text-fall-coffee tracking-tight">Descargar etiquetas</h3>
                </div>
                <!-- Chevron animado -->
                <svg id="main-chevron" class="w-6 h-6 text-fall-coffee/30 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <!-- CONTENIDO PRINCIPAL (Nivel 1) -->
            <div id="main-content" class="accordion-content border-t border-fall-coffee/5 bg-white/30">
                <div class="p-3 flex flex-col gap-3">

                    <!-- OPCIÓN A: Bundle 360 gr (Nivel 2 - Sub-acordeón) -->
                    <div class="sub-accordion rounded-2xl border border-fall-coffee/5 bg-white/50 overflow-hidden">
                        <button class="sub-trigger w-full flex items-center justify-between p-5 text-left group">
                            <span class="font-body text-base font-semibold text-fall-coffee group-hover:text-fall-rust transition-colors">Bundle de 360 gr</span>
                            <svg class="sub-chevron w-5 h-5 text-fall-coffee/20 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <!-- Enlaces internos (Sub-nivel 2) -->
                        <div class="sub-content accordion-content bg-fall-cream/30">
                            <div class="p-4 pl-6 flex flex-col gap-2.5 border-t border-fall-coffee/5">
                                <a href="#" class="text-sm text-fall-coffee/70 hover:text-fall-rust transition-colors py-1 flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-fall-rust/30"></span> Natural, Vainilla y Fresa
                                </a>
                                <a href="#" class="text-sm text-fall-coffee/70 hover:text-fall-rust transition-colors py-1 flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-fall-rust/30"></span> Natural, Café y Envinada
                                </a>
                                <!-- ... resto de enlaces ... -->
                            </div>
                        </div>
                    </div>

                    <!-- OPCIÓN B: Bundle 155 gr (Nivel 2 - Sub-acordeón) -->
                    <div class="sub-accordion rounded-2xl border border-fall-coffee/5 bg-white/50 overflow-hidden">
                        <button class="sub-trigger w-full flex items-center justify-between p-5 text-left group">
                            <span class="font-body text-base font-semibold text-fall-coffee group-hover:text-fall-rust transition-colors">Bundle de 155 gr</span>
                            <svg class="sub-chevron w-5 h-5 text-fall-coffee/20 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </button>
                        <div class="sub-content accordion-content bg-fall-cream/30">
                            <div class="p-4 pl-6 flex flex-col gap-2.5 border-t border-fall-coffee/5">
                                <a href="#" class="text-sm text-fall-coffee/70 hover:text-fall-rust transition-colors py-1 flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-fall-rust/30"></span> Natural, Vainilla y Fresa
                                </a>
                                <!-- ... resto de enlaces ... -->
                            </div>
                        </div>
                    </div>

                    <!-- OPCIÓN C: Sold as a Set (Enlace Directo Premium) -->
                    <a href="https://drive.google.com/file/d/1BVIo4PhHDz91jv6kU1cvcosFaDL6vUyo/view?usp=sharing" target="_blank" class="w-full bg-white/50 hover:bg-fall-rust/5 border border-fall-coffee/5 hover:border-fall-rust/20 rounded-2xl p-5 flex items-center justify-between group transition-all duration-300">
                        <span class="font-body text-base font-semibold text-fall-coffee group-hover:text-fall-rust">Plantilla de "Sold as a Set"</span>
                        <svg class="w-5 h-5 text-fall-rust opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                    </a>

                </div>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE INTERACCIÓN CON GSAP -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const easePremium = "cubic-bezier(0.23, 1, 0.32, 1)"; // Curva de aceleración suave y costosa

            // --- ACORDEÓN PRINCIPAL (Nivel 1) ---
            const mainTrigger = document.getElementById('main-trigger');
            const mainContent = document.getElementById('main-content');
            const mainChevron = document.getElementById('main-chevron');
            let isMainOpen = false;

            // Pre-setear el estado cerrado con GSAP
            gsap.set(mainContent, { height: 0, opacity: 0 });

            mainTrigger.addEventListener('click', () => {
                isMainOpen = !isMainOpen;
                
                // Animación de la altura y opacidad
                gsap.to(mainContent, {
                    height: isMainOpen ? "auto" : 0,
                    opacity: isMainOpen ? 1 : 0,
                    duration: 0.6,
                    ease: easePremium
                });

                // Rotación del Chevron
                gsap.to(mainChevron, {
                    rotation: isMainOpen ? 180 : 0,
                    duration: 0.6,
                    ease: easePremium
                });
            });

            // --- SUB-ACORDEONES (Nivel 2) ---
            const subAccordions = document.querySelectorAll('.sub-accordion');

            subAccordions.forEach(acc => {
                const trigger = acc.querySelector('.sub-trigger');
                const content = acc.querySelector('.sub-content');
                const chevron = acc.querySelector('.sub-chevron');
                let isOpen = false;

                // Pre-setear cerrado
                gsap.set(content, { height: 0, opacity: 0 });

                trigger.addEventListener('click', () => {
                    isOpen = !isOpen;

                    // Cerrar otros sub-acordeones abiertos (opcional, para UX más limpia)
                    if (isOpen) {
                        subAccordions.forEach(otherAcc => {
                            if (otherAcc !== acc && otherAcc.classList.contains('is-sub-open')) {
                                otherAcc.click(); // Trigger click para cerrar
                            }
                        });
                        acc.classList.add('is-sub-open');
                    } else {
                        acc.classList.remove('is-sub-open');
                    }

                    gsap.to(content, {
                        height: isOpen ? "auto" : 0,
                        opacity: isOpen ? 1 : 0,
                        duration: 0.5,
                        ease: easePremium
                    });

                    gsap.to(chevron, {
                        rotation: isOpen ? 180 : 0,
                        duration: 0.5,
                        ease: easePremium
                    });
                });
            });
        });
    </script>
</body>
</html>
