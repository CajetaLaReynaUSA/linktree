<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajeta La Reyna - Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --naranja: #e69127;
            --cafe: #4a1d0f;
            --crema: #fdf5eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #1a0a05;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* FONDO DESENFOCADO PARA PC */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1776971107/Dise%C3%B1o_sin_t%C3%ADtulo_7_cbkuhu.webp') center bottom / cover no-repeat;
            filter: blur(50px) brightness(0.3);
            transform: scale(1.1);
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px; /* Ancho de un iPhone Pro Max */
            height: 100vh;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1776971107/Dise%C3%B1o_sin_t%C3%ADtulo_7_cbkuhu.webp') center bottom / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            padding: 2% 25px 5% 25px;
            overflow: hidden;
        }

        /* CABECERA PROFESIONAL */
        .header { text-align: center; margin-bottom: 10px; margin-top: 10px; }

        .main-title {
            background: var(--naranja);
            color: var(--cafe);
            padding: 10px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            margin-bottom: 12px;
            display: inline-block;
        }

        .sub-title {
            color: white;
            font-family: 'Playfair Display', serif; /* Toque gourmet */
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: block;
            opacity: 0.9;
        }

        /* BOTONES ESTILIZADOS */
        .nav-links {
            width: 100%;
            max-width: 260px; /* Más estrechos = más elegante */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            background: rgba(253, 245, 235, 0.95);
            color: var(--cafe);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .btn:hover {
            background: var(--cafe);
            color: white;
            transform: translateY(-2px);
        }

        /* FOOTER (RE-POSICIONADO) */
        .footer-content {
            margin-top: auto; /* Lo manda abajo */
            margin-bottom: 35%; /* SUBIMOS LOS ICONOS para que no pisen las botellas */
            text-align: center;
            width: 100%;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 10px;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .distributor {
            color: white;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* AJUSTES PARA PANTALLAS PEQUEÑAS */
        @media (max-height: 750px) {
            .footer-content { margin-bottom: 30%; } /* Sube más los iconos en pantallas cortas */
            .main-title { font-size: 1.1rem; }
            .nav-links { gap: 8px; }
        }

        @media (max-width: 600px) {
            .desktop-bg { display: none; }
            .main-container { max-width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="desktop-bg"></div>

    <main class="main-container">
        
        <header class="header">
            <h1 class="main-title">Cajeta de Celaya</h1>
            <span class="sub-title">Variedad Artesanal</span>
        </header>

        <nav class="nav-links">
            <a href="#" class="btn">Nuestros Sabores</a>
            <a href="#" class="btn">Puntos de Venta</a>
            <a href="#" class="btn">Pedidos WhatsApp</a>
            <a href="#" class="btn">Nuestra Historia</a>
        </nav>

        <div class="footer-content">
            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
            </div>
            <p class="distributor">Distribuido por: Tu Marca Aquí</p>
        </div>

    </main>

</body>
</html>
