<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajeta La Reyna - Gourmet</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Open+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --naranja-brillante: #f9a825;
            --cafe-oscuro: #4a1d0f;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #1a0a05;
            font-family: 'Open Sans', sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* FONDO PARA PC */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1776971107/Dise%C3%B1o_sin_t%C3%ADtulo_7_cbkuhu.webp') center bottom / cover no-repeat;
            filter: blur(50px) brightness(0.3);
            transform: scale(1.1);
        }

        /* CONTENEDOR MÓVIL */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1776971107/Dise%C3%B1o_sin_t%C3%ADtulo_7_cbkuhu.webp') center bottom / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3% 25px; /* Padding superior mínimo para subir los títulos */
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* --- NUEVO ESTILO DE TÍTULO (Basado en tu imagen) --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .script-text {
            font-family: 'Dancing Script', cursive;
            color: var(--naranja-brillante);
            font-size: 2.8rem;
            margin-bottom: -22px; /* Esto hace que se encime al texto de abajo */
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transform: rotate(-3deg); /* Le da el toque orgánico */
        }

        .bold-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--blanco);
            font-size: 4.0rem;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .orange-subtitle {
            color: var(--naranja-brillante);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 13px;
            display: block;
        }

        /* BOTONES */
        .nav-links {
            width: 100%;
            max-width: 270px;
            display: flex;
            flex-direction: column;
            gap: 11px;
            z-index: 4;
            margin-top: 26px;
            margin-bottom: auto;
        }

        .btn {
            background: rgba(255, 255, 255, 0.95);
            color: var(--cafe-oscuro);
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: var(--cafe-oscuro);
            color: white;
            transform: translateY(-2px);
        }

        /* FOOTER (RE-POSICIONADO PARA NO PISAR LAS BOTELLAS) */
        .footer-content {
            margin-top: auto;
            margin-bottom: 51%; /* Espacio suficiente para ver las botellas */
            text-align: center;
            width: 100%;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 35 px; /* Espacio después del distribuidor */
        }

        .social-icons a { color: white; font-size: 1.3 rem; }

        .distributor {
            color: white;
            font-size: 0.57rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .desktop-bg { display: none; }
            .main-container { max-width: 100%; padding-top: 8%; }
        }
    </style>
</head>
<body>

    <div class="desktop-bg"></div>

    <main class="main-container">
        
        <header class="header">
            <span class="script-text">Cajeta</span>
            <h1 class="bold-title">La Reyna</h1>
            <span class="orange-subtitle">Cajeta Artesanal Producida en Celaya, México</span>
        </header>

        <nav class="nav-links">
            <a href="#" class="btn">Nuestros Sabores</a>
            <a href="#" class="btn">Puntos de Venta</a>
            <a href="#" class="btn">Pedidos WhatsApp</a>
            <a href="#" class="btn">Nuestra Historia</a>
        </nav>

        <div class="footer-content">
            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
            </div>
            <p class="distributor">Distribuido por: Fevamex</p>
        </div>

    </main>

</body>
</html>
