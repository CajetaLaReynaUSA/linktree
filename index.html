<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajeta La Reyna - Gourmet</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Open+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --naranja-brillante: #f9a825;
            --cafe-oscuro: #4a1d0f;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
        html {
            scroll-behavior: smooth; /* Hace que el scroll sea fluido */
        }

        body {
            background-color: #1a0a05;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            flex-direction: column;
            /* Eliminamos overflow:hidden y justify-content:center que rompían el scroll */
        }

        /* FONDO PARA PC */
        /* --- FONDO PARA PC --- */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1779315666/Distribuido_en_EE.UU_por_Fevamex_2_nmmng1.webp') center bottom / cover no-repeat;
            filter: blur(50px) brightness(0.3);
            transform: scale(1.1);
        }

        /* CONTENEDOR MÓVIL */
        /* --- CONTENEDOR MÓVIL --- */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100dvh;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1779315666/Distribuido_en_EE.UU_por_Fevamex_2_nmmng1.webp') center bottom / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3% 25px; /* Padding superior mínimo para subir los títulos */
            /* Aumentamos el padding superior e inferior para dar mucho más respiro a las ideas */
            padding: 10% 25px 15% 25px; 
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* --- NUEVO ESTILO DE TÍTULO (Basado en tu imagen) --- */
        /* --- TÍTULOS --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
            margin-bottom: 45px; /* Más aire entre el header y los botones */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .script-text {
            font-family: 'Dancing Script', cursive;
            color: var(--naranja-brillante);
            font-size: 3.2rem;
            margin-bottom: -22px; /* Esto hace que se encime al texto de abajo */
            font-size: 3.5rem; /* Un poco más grande para contraste */
            margin-bottom: -20px; 
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transform: rotate(-3deg); /* Le da el toque orgánico */
            transform: rotate(-3deg); 
        }

        .bold-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--blanco);
            font-size: 4.0rem;
            font-size: 4.2rem;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .orange-subtitle {
            color: var(--naranja-brillante);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 0.8rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-top: 13px;
            margin-top: 20px; /* Separamos más el subtítulo del título principal */
            display: block;
            margin: 13px 10px 0px 10px;
        }

        /* BOTONES */
        /* --- BOTONES --- */
        .nav-links {
            width: 100%;
            max-width: 270px;
            max-width: 290px; /* Ensanchamos ligeramente para mejor lectura */
            display: flex;
            flex-direction: column;
            gap: 11px;
            gap: 20px; /* Aumentamos el espacio entre ideas (antes 11px) */
            z-index: 4;
        
            margin-top: 10px;
            margin-bottom: auto;
        
            transform: translateY(40px);
            margin-bottom: auto; /* Empuja contenido futuro hacia abajo */
        }

        .btn {
            background: #FFFFFF;
            color: var(--cafe-oscuro);
            text-decoration: none;
            padding: 14px;
            padding: 16px; /* Más altos para mejor zona de "toque" (UX) */
            border-radius: 14px;
            font-size: 0.9rem;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            transition: 0.3s;
            transition: all 0.3s ease; /* Transición general suavizada */
            box-shadow: 0 6px 20px rgba(0,0,0,0.15); 
            border: 1px solid rgba(255,255,255,0.8); /* Un borde sutil para dar brillo */
            border: 1px solid rgba(255,255,255,0.8); 
        }

        .btn:hover {
            background: var(--naranja-brillante); 
            color: var(--cafe-oscuro); /* El texto queda oscuro para legibilidad */
            transform: translateY(-3px) scale(1.02); /* Sube un poco más y crece */
            box-shadow: 0 10px 25px rgba(249, 168, 37, 0.4); /* Sombra naranja brillante */
        }

        /* FOOTER (RE-POSICIONADO PARA NO PISAR LAS BOTELLAS) */
        .footer-content {
            text-align: center;
            width: 100%;
            padding-bottom: 20px; /* Respiro para que no toque las botellas */
        }


        .distributor {
            color: white;
            font-size: 0.50rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            color: var(--cafe-oscuro); 
            transform: translateY(-4px) scale(1.02); /* Animación más notoria */
            box-shadow: 0 10px 25px rgba(249, 168, 37, 0.4); 
        }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 600px) {
            .desktop-bg { display: none; }
            .main-container { max-width: 100%; padding-top: 8%; }
            .main-container { 
                max-width: 100%; 
                padding-top: 15%; 
                padding-bottom: 25%; /* Asegura que se pueda hacer scroll hasta el final en mobile */
            }
        }
    </style>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SFP2DLPMX5"></script>
    
    <script>
      window.dataLayer = window.dataLayer || [];
    
      function gtag(){
        dataLayer.push(arguments);
      }
    
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
    
      gtag('config', 'G-SFP2DLPMX5');
    </script>
</head>

    
<body>

    <div class="desktop-bg"></div>

    <main class="main-container">

        <header class="header">
            <span class="script-text">Cajeta</span>
            <h1 class="bold-title">La Reyna</h1>
            <span class="orange-subtitle">Producida e importada desde Celaya, México</span>
        </header>

         <!-- Botones para rastrear uso -->
        <nav class="nav-links">
         <nav class="nav-links">
            <a 
              href="https://a.co/d/04OIyzlR"
              class="btn"
              onclick="gtag('event', 'click_amazon', {
                button_name: 'comprar_amazon_home',
                page_name: 'home'
              });"
            >
              Comprar en Amazon
            </a>

            <a 
              href="nuestros-sabores.html"
              class="btn"
              onclick="gtag('event', 'click_guia_sabores', {
                button_name: 'guia_sabores_home',
                page_name: 'home'
              });"
            >
              Guía de sabores
            </a>

            <a 
              href="nosotros.html"
              class="btn"
              onclick="gtag('event', 'click_credenciales', {
                button_name: 'desde_celaya_home',
                page_name: 'home'
              });"
            >
              Desde Celaya, Guanajuato
            </a>
        </nav>


    </main>

</body>
</html>
