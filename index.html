<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajeta de Celaya - Saborizada con Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Variables de color basadas en tu imagen */
        :root {
            --naranja-vibrante: #F9A825;
            --cafe-oscuro: #3E2723;
            --blanco-puro: #FFFFFF;
            --crema: #FFF8E1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Open Sans', sans-serif;
            overflow-x: hidden;
            background-color: var(--cafe-oscuro);
        }

        /* --- EFECTO DE FONDO DESENFOCADO --- */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('TU_URL_DE_CLOUDINARY'); /* Imagen de fondo */
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.6); /* Desenfocado y un poco oscuro */
            transform: scale(1.1); /* Evita bordes blancos por el blur */
        }

        /* --- CONTENEDOR PRINCIPAL (VERTICAL) --- */
        .main-container {
            position: relative;
            max-width: 500px; /* Tamaño tipo celular en desktop */
            min-height: 100vh;
            margin: 0 auto;
            background-image: url('TU_URL_DE_CLOUDINARY'); /* Imagen nítida */
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            color: var(--blanco-puro);
            text-align: center;
        }

        /* --- ESTILOS DE TEXTO (Estilo de la imagen) --- */
        .header-box {
            width: 100%;
        }

        .title-pill {
            background-color: var(--naranja-vibrante);
            color: var(--blanco-puro);
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .subtitle-pill {
            background-color: var(--blanco-puro);
            color: var(--naranja-vibrante);
            padding: 10px 25px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 800;
            display: inline-block;
        }

        .content-bottom {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            margin-bottom: 20px;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--naranja-vibrante);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.3s ease;
            margin-top: 15px;
        }

        .cta-button:hover {
            transform: scale(1.05);
        }

        /* Logo GTO en la esquina o abajo */
        .logo-gto {
            width: 100px;
            margin-top: 20px;
        }

        /* Responsivo para móviles */
        @media (max-width: 600px) {
            .main-container {
                max-width: 100%;
                box-shadow: none;
            }
            .bg-wrapper {
                display: none; /* No necesitamos el blur en el móvil */
            }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>

    <div class="main-container">
        
        <div class="header-box">
            <h1 class="title-pill">CAJETA DE CELAYA</h1>
            <br>
            <h2 class="subtitle-pill">SABORIZADA CON CAFÉ</h2>
        </div>

        <div class="content-bottom">
            <p>Descubre el sabor artesanal de Guanajuato en cada gota. Perfecta para acompañar tus postres favoritos.</p>
            <a href="#" class="cta-button">¡Haz tu pedido!</a>
            <br>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Logo_Guanajuato.svg/1200px-Logo_Guanajuato.svg.png" alt="Marca GTO" class="logo-gto">
        </div>

    </div>

</body>
</html>
