<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajeta La Reyna - Gourmet</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&family=Open+Sans:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --naranja-brillante: #f9a825;
            --cafe-oscuro: #4a1d0f;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background-color: #1a0a05;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- FONDO PARA PC --- */
        .desktop-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1779315666/Distribuido_en_EE.UU_por_Fevamex_2_nmmng1.webp') center bottom / cover no-repeat;
            filter: blur(50px) brightness(0.3);
            transform: scale(1.1);
        }

        /* --- CONTENEDOR MÓVIL PRINCIPAL --- */
        .main-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100dvh;
            background: url('https://res.cloudinary.com/dlylomauh/image/upload/v1779315666/Distribuido_en_EE.UU_por_Fevamex_2_nmmng1.webp') center bottom / cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10% 25px 15% 25px; 
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* --- SECCIÓN 1: HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .script-text {
            font-family: 'Dancing Script', cursive;
            color: var(--naranja-brillante);
            font-size: 3.5rem;
            margin-bottom: -20px; 
            z-index: 3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transform: rotate(-3deg); 
        }

        .bold-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            color: var(--blanco);
            font-size: 4.2rem;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            z-index: 2;
        }

        .orange-subtitle {
            color: var(--naranja-brillante);
            font-weight: 800;
            letter-spacing: 3px;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-top: 20px;
            display: block;
        }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 600px) {
            .desktop-bg { display: none; }
            .main-container { 
                max-width: 100%; 
                padding-top: 15%; 
                padding-bottom: 25%; 
            }
        }
    </style>
</head>
<body>

    <div class="desktop-bg"></div>

    <main class="main-container">
        
        <header class="header">
            <span class="script-text">Cajeta</span>
            <h1 class="bold-title">La Reyna</h1>
            <span class="orange-subtitle">Producida e importada desde Celaya, México</span>
        </header>

        </main>

</body>
</html>
