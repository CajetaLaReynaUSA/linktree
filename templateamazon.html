<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo FBA - Estilo Minimalista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #ffffff;
            --text-light: #ffffff;
            --text-dark: #333333;
            
            /* Gradientes y fondos alternados */
            --gradient-warm: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #CD853F 100%);
            --bg-dark-card: #1a1a1a;
            --nav-bg: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            padding: 40px 20px 120px 20px; /* Espacio inferior para la barra flotante */
        }

        /* Cuadrícula de Tarjetas: Forzada a 2 columnas exactas para que todas midan lo mismo */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Estilo base de los colapsables (Cards) */
        details {
            border-radius: 12px;
            overflow: hidden;
            color: var(--text-light);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Alternando estilos de tarjetas */
        details:nth-child(odd) {
            background: var(--gradient-warm);
        }
        
        details:nth-child(even) {
            background: var(--bg-dark-card);
            background-image: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.05) 0%, transparent 40%);
        }

        /* El botón clickeable de la tarjeta */
        summary {
            padding: 50px 40px;
            cursor: pointer;
            list-style: none;
            display: flex;
            flex-direction: column;
            min-height: 400px; /* Todas tienen exactamente la misma altura mínima */
            position: relative;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        /* Etiqueta superior de "PASO" - Tamaño Aumentado */
        .overline {
            font-size: 1.5rem; /* Tamaño notablemente más grande */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: auto; 
        }

        .overline span {
            color: rgba(255,255,255,0.7);
            margin-right: 8px;
        }

        /* Título gigante */
        summary h2 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 40px;
            margin-top: 40px;
        }

        /* Enlace subrayado inferior */
        .action-link {
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 6px;
            text-decoration-thickness: 2px;
            margin-top: auto;
            transition: opacity 0.2s;
        }

        summary:hover .action-link {
            opacity: 0.7;
        }

        /* Contenido desplegable (Vacío para rellenar) */
        .content {
            padding: 0 40px 50px 40px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Barra de navegación flotante inferior */
        .floating-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--nav-bg);
            padding: 15px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .floating-nav span {
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .floating-nav span.inactive {
            color: rgba(255,255,255,0.5);
        }

        .nav-btn {
            background-color: #2a2a2a;
            border-radius: 30px;
            padding: 8px 12px 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-icon {
            background: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        /* Responsividad para móviles y tablets */
        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: 1fr; /* 1 sola columna en pantallas pequeñas */
            }
            summary h2 {
                font-size: 2.2rem;
            }
            .overline {
                font-size: 1.2rem;
            }
            summary {
                min-height: 300px;
                padding: 30px 20px;
            }
            .content {
                padding: 0 20px 30px 20px;
            }
            .floating-nav {
                width: 90%;
                justify-content: space-between;
                padding: 10px 15px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">

        <details>
            <summary>
                <div class="overline"><span>●</span> PASO 1</div>
                <h2>¿Cuántos Bundles se tienen que preparar?</h2>
                <div class="action-link">Ver más</div>
            </summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>
                <div class="overline"><span>●</span> PASO 2</div>
                <h2>¿Cómo se preparan los Bundles?</h2>
                <div class="action-link">Ver más</div>
            </summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>
                <div class="overline"><span>●</span> PASO 3</div>
                <h2>Etiquetado.</h2>
                <div class="action-link">Ver más</div>
            </summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>
                <div class="overline"><span>●</span> PASO 4</div>
                <h2>Empaquetado.</h2>
                <div class="action-link">Ver más</div>
            </summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>
                <div class="overline"><span>●</span> PASO 5</div>
                <h2>Cierre y recolección.</h2>
                <div class="action-link">Ver más</div>
            </summary>
            <div class="content">
                </div>
        </details>


    </div>

</body>
</html>
