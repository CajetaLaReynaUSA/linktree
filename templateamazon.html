<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cómo se envían los Bundles de Cajetas a Amazon?</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fall: {
                            cream: '#F4EFE6',
                            coffee: '#3E2723',
                            rust: '#C84B31',
                            mustard: '#E19832',
                            olive: '#4F6F52'
                        }
                    },
                    fontFamily: {
                        retro: ['"Bricolage Grotesque"', 'serif'],
                        body: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #F4EFE6; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F4EFE6; }
        ::-webkit-scrollbar-thumb { background: #E19832; border-radius: 10px; }
        
        .hero-piece {
            display: inline-block;
            white-space: pre;
            will-change: transform, opacity;
        }
    </style>
</head>

<body class="text-fall-coffee font-body antialiased selection:bg-fall-mustard selection:text-white">

    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none opacity-30 md:opacity-50">
        <div class="absolute inset-0 opacity-[0.025]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.75%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');"></div>
        <div class="bg-shape-1 absolute -top-20 -left-20 w-72 h-72 md:w-[32rem] md:h-[32rem] bg-fall-mustard rounded-full blur-[90px] md:blur-[140px]"></div>
        <div class="bg-shape-2 absolute top-1/3 right-[-10%] w-80 h-[35rem] bg-fall-olive/30 rounded-full blur-[100px] md:blur-[160px]"></div>
        <div class="bg-shape-3 absolute bottom-[-10%] left-1/3 w-96 h-96 bg-fall-rust/20 rounded-full blur-[110px] md:blur-[150px]"></div>
        
        <svg class="geo-vector-1 absolute top-[20%] left-[10%] w-40 opacity-20" viewBox="0 0 100 100" fill="none" stroke="#4F6F52" stroke-width="1.5">
            <circle cx="50" cy="50" r="35" stroke-dasharray="6 4" />
        </svg>
        <svg class="geo-vector-2 absolute bottom-[15%] right-[5%] w-56 opacity-15" viewBox="0 0 100 100" fill="#C84B31">
            <path d="M0,100 C0,44.7 44.7,0 100,0 L100,100 Z" />
        </svg>
    </div>

    <div class="hero-extra fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col items-center opacity-50 pointer-events-none">
        <span class="text-xs tracking-widest uppercase font-bold text-fall-rust mb-2 font-body animate-pulse">Haz Scroll</span>
        <div class="w-[2px] h-6 bg-fall-rust"></div>
    </div>

    <header id="hero-section" class="relative w-full h-screen flex flex-col justify-center items-center text-center px-6">
        <div id="hero-content" class="max-w-6xl mx-auto w-full">
            
            <span class="hero-extra inline-block py-1.5 px-5 rounded-full bg-fall-rust/10 text-fall-rust font-bold text-sm tracking-widest uppercase mb-8">Manual Logístico FBA</span>
            
            <h1 class="font-retro text-5xl md:text-7xl lg:text-8xl xl:text-[6.5rem] text-fall-coffee font-extrabold leading-[1.05] tracking-tight mb-10 flex flex-wrap justify-center gap-x-3 md:gap-x-5 gap-y-2">
                <span class="hero-piece">¿Cómo</span>
                <span class="hero-piece">se</span>
                <span class="hero-piece">envían</span>
                <span class="hero-piece">los</span>
                <span class="hero-piece text-fall-rust">Bundles</span>
                <span class="hero-piece text-fall-rust">de</span>
                <span class="hero-piece text-fall-rust">Cajetas</span>
                <span class="hero-piece">a</span>
                <span class="hero-piece">Amazon?</span>
            </h1>
            
            <div class="hero-extra w-16 md:w-28 h-1.5 bg-fall-mustard mx-auto rounded-full"></div>
            
        </div>
    </header>

    <div class="h-screen flex items-center justify-center">
        <p class="font-retro text-2xl text-fall-coffee/30">Aquí irá la siguiente sección...</p>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Entrada inicial fluida al cargar
        gsap.from(".hero-piece", {
            y: 80,
            opacity: 0,
            duration: 1,
            stagger: 0.04,
            ease: "power4.out"
        });
        gsap.from(".hero-extra", {
            opacity: 0,
            duration: 0.8,
            delay: 0.4
        });

        // Línea de tiempo optimizada: Recorrido corto (600px) y física lineal (none)
        const tlDesarmar = gsap.timeline({
            scrollTrigger: {
                trigger: "#hero-section",
                start: "top top",
                end: "+=600", // Cambio menor: Animación mucho más rápida al scrollear
                pin: true,
                scrub: true
            }
        });

        tlDesarmar.to(".hero-extra", {
            opacity: 0,
            y: -30,
            ease: "none"
        }, 0);

        tlDesarmar.to(".hero-piece", {
            x: () => gsap.utils.random(-120, 120),
            y: () => gsap.utils.random(-180, -40),
            rotation: () => gsap.utils.random(-35, 35),
            scale: () => gsap.utils.random(0.7, 1.3),
            opacity: 0,
            stagger: 0.01,
            ease: "none" // Clave para que se re-arme idéntico y fluido al subir el scroll
        }, 0);

        // Parallax del fondo
        gsap.to('.bg-shape-1', { y: 100, ease: "none", scrollTrigger: { scrub: true } });
        gsap.to('.bg-shape-2', { y: -150, ease: "none", scrollTrigger: { scrub: true } });
        gsap.to('.bg-shape-3', { y: -80, x: 30, ease: "none", scrollTrigger: { scrub: true } });
    </script>
</body>
</html>
