<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo FBA - Modern Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505; /* Negro profundo */
            --text-main: #ffffff; /* Blanco puro para contraste */
            --text-muted: #888888; /* Gris para elementos secundarios */
            --accent: #ccff00; /* Un verde/amarillo neón muy usado en agencias modernas para resaltar */
            --border-color: #222222; /* Líneas divisorias sutiles */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Título audaz y limpio */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 60px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 span {
            color: var(--accent);
        }

        /* Secciones colapsables (Acordeón) */
        details {
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        /* Estilo del botón/título del acordeón */
        summary {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 35px 0;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color 0.3s ease;
        }

        /* Ocultar la flecha por defecto del navegador */
        summary::-webkit-details-marker {
            display: none;
        }

        /* Efecto hover */
        summary:hover {
            color: var(--accent);
        }

        /* Icono de "+" personalizado */
        summary::after {
            content: '+';
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--text-muted);
            transition: transform 0.4s ease, color 0.3s ease;
        }

        /* Estilos cuando la sección está ABIERTA */
        details[open] summary {
            color: var(--accent);
        }

        details[open] summary::after {
            content: '−';
            color: var(--accent);
            transform: rotate(180deg);
        }

        /* Contenedor vacío preparado para tu texto */
        .content {
            padding: 0 0 40px 0;
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        /* Animación suave al abrir */
        details[open] .content {
            animation: fadeInDown 0.4s ease-out;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Responsivo para celulares */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            summary { font-size: 1.2rem; padding: 25px 0; }
            summary::after { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Protocolo <span>FBA</span></h1>

        <details>
            <summary>1. ¿Cuántos Bundles se tienen que preparar?</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>2. ¿Cómo se preparan los Bundles?</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>3. El etiquetado</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>4. El empaquetado en cajas</summary>
            <div class="content">
                </div>
        </details>

        <details>
            <summary>5. Cierre y recolección</summary>
            <div class="content">
                </div>
        </details>
    </div>

</body>
</html>
